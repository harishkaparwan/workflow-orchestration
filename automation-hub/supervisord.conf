[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:api]
command=node dist/apps/api/main.js
directory=/app
autostart=true
autorestart=true
startretries=3
stderr_logfile=/var/log/api.err.log
stdout_logfile=/var/log/api.out.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
environment=NODE_ENV="production",PORT="3000"

[program:n8n]
command=bash apps/n8n-worker/scripts/start.sh
directory=/app
autostart=true
autorestart=true
startretries=3
stderr_logfile=/var/log/n8n.err.log
stdout_logfile=/var/log/n8n.out.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB

[program:python_backend]
command=uvicorn src.main:app --host 0.0.0.0 --port 8000
directory=/app/apps/python-backend
autostart=true
autorestart=true
startretries=3
stderr_logfile=/var/log/python_backend.err.log
stdout_logfile=/var/log/python_backend.out.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
